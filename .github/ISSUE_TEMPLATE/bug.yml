name: "🐛 Bug Report"
description: "Report a bug"
labels: ["type:bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "Clear and concise description of the bug"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: "Steps to Reproduce"
      value: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      value: |
        - OS:
        - Browser/Runtime:
        - Version:
  - type: dropdown
    id: priority
    attributes:
      label: "Severity"
      options:
        - P0-Critical (system down)
        - P1-High (major feature broken)
        - P2-Medium (workaround exists)
        - P3-Low (cosmetic)
    validations:
      required: true
