name: Release Please
run-name: >-
  ${{ format('Release Please · {0} by @{1} (run #{2})', github.ref_name, github.actor, github.run_number) }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          release-type: node
          token: ${{ secrets.GITHUB_TOKEN }}
